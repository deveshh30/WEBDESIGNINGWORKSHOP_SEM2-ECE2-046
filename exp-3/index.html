<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2 id="main heading">Welcome to JS Lab</h2>
        <input type="text" id="name" placeholder="Enter the heading text">
        
        <div class="button-group">
            <button id="changtxtbtn">Change Heading</button>
            <button id="bgcolorbtn">Change Background</button>
            <button id="fontsizebtn">Increase Font Size</button>
            <button id="togglebtn">Show/Hide paragraph</button>
            <button id="resetbtn">Reset</button>
        </div>

        <p id="paragraph">This is a sample paragraph. JavaScript events can dynamically change content.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
